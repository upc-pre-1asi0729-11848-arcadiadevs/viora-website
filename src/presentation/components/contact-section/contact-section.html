<section class="contact-section" id="contact" aria-labelledby="contact-title">
    <div class="contact-section__container">

        <div class="contact-section__row contact-section__row--header">
            <div class="contact-section__col contact-section__col--label">
                <span class="contact-section__bullet"></span>
                <span class="contact-section__label" data-i18n="contact.sectionLabel">Contact</span>
            </div>
            <div class="contact-section__col contact-section__col--title">
                <h2 class="contact-section__title" id="contact-title" data-i18n="contact.title">Talk to the team behind Viora</h2>
            </div>
            <div class="contact-section__col contact-section__col--logo">
                <img src="./assets/logos/viora-isologotipo-white.png" alt="Viora Logo" class="contact-section__logo" />
            </div>
        </div>

        <div class="contact-section__row">
            <div class="contact-section__col contact-section__col--label">
                <span class="contact-section__bullet"></span>
                <span class="contact-section__label" data-i18n="contact.getInTouch.label">Get In Touch</span>
            </div>
            <div class="contact-section__col contact-section__col--info">
                <span class="contact-section__info-label" data-i18n="contact.getInTouch.talkToUs">Talk to us</span>
                <a href="tel:+51933855712" class="contact-section__link" data-i18n="contact.getInTouch.phone">+51 933 855 712</a>
            </div>
            <div class="contact-section__col contact-section__col--info">
                <span class="contact-section__info-label" data-i18n="contact.getInTouch.writeUs">Write us</span>
                <a href="mailto:daroncameloftdev@gmail.com" class="contact-section__link" data-i18n="contact.getInTouch.email">daroncameloftdev@gmail.com</a>
            </div>
        </div>

        <div class="contact-section__row">
            <div class="contact-section__col contact-section__col--label">
                <span class="contact-section__bullet"></span>
                <span class="contact-section__label" data-i18n="contact.address.label">Address</span>
            </div>
            <div class="contact-section__col contact-section__col--info">
                <span class="contact-section__info-value" data-i18n="contact.address.location">Av Alameda San Marcos 11,<br />Chorrillos 15067</span>
                <a href="#" class="contact-section__link contact-section__link--map" data-i18n="contact.address.googleMaps">Google Maps</a>
            </div>
            <div class="contact-section__col contact-section__col--info">
                <span class="contact-section__info-label" data-i18n="contact.address.openForm">Open form</span>
                <a href="#" class="contact-section__link" data-i18n="contact.address.sendMessage">Send a message</a>
