<section
        class="problem-panel"
        data-video-expand-section
        aria-labelledby="problem-panel-title"
>
    <div class="problem-panel__sticky" data-video-expand-sticky>
        <div class="problem-panel__intro-layout">
            <div class="problem-panel__intro-content">
                <h2
                        class="problem-panel__intro-text"
                        id="problem-panel-title"
                        data-i18n="problemSolution.problemPanel.introText"
                >
                    Olive farming is becoming more volatile. Don’t just react to field risk — anticipate it.
                    Viora helps you move forward with actionable data, earlier pest-risk visibility, and direct
                    access to the right crop protection specialist.
                </h2>
            </div>

            <div class="problem-panel__media-placeholder" data-video-expand-placeholder></div>
        </div>

        <figure class="problem-panel__media" data-video-expand-media>
            <video
                    class="problem-panel__video"
                    src="./assets/videos/problem-panel-field-risk.mp4"
                    muted
                    autoplay
                    loop
                    playsinline
            ></video>

            <figcaption class="problem-panel__caption" data-video-expand-caption>
                <div class="problem-panel__caption-line"></div>

                <p class="problem-panel__caption-text" data-i18n="problemSolution.problemPanel.expandedText">
                    Viora transforms environmental uncertainty into early, actionable risk intelligence
                    for every olive plot.
                </p>
            </figcaption>
        </figure>
    </div>
</section>
